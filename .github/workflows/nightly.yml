name: Nightly (latest deps)

# Exercises the integration against the LATEST upstream dependencies every day,
# separately from PR CI (.github/workflows/tests.yml, which pins specific HA
# channels). This is the early-warning system for HA-side drift: the pytest job
# installs HA + the test harness completely unpinned, and the validate job runs
# hassfest + HACS, which always pull the latest HA tooling. A failure here means
# a future HA release will break us, even when PR CI on its pins is green.

on:
  schedule:
    - cron: "29 4 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-latest:
    name: pytest (latest HA + harness)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Latest HA requires Python 3.14 (see tests.yml stable leg), and an
          # unpinned harness resolves the latest HA, so the nightly tracks 3.14.
          python-version: "3.14"

      - name: Install latest Home Assistant + test harness (unpinned)
        run: |
          python -m pip install --upgrade pip
          # No version pins: pip resolves the newest HA and the newest test
          # harness, so the nightly always runs against the latest upstream.
          python -m pip install --upgrade \
            homeassistant \
            pytest-homeassistant-custom-component

      - name: Run tests
        run: pytest tests/ -v

  validate:
    name: hassfest + HACS (latest tooling)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Hassfest
        uses: home-assistant/actions/hassfest@master

      - name: HACS
        uses: hacs/action@main
        with:
          category: integration
